<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR P2P Screen & Audio Share</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center justify-center p-4">

    <div class="max-w-md w-full bg-gray-800 rounded-xl p-6 shadow-2xl border border-gray-700 text-center">
        <h1 class="text-2xl font-bold mb-1 text-indigo-400">QR P2P Screen Share</h1>
        <p class="text-xs text-gray-500 mb-6">画面＋PC内音声 配信システム</p>
        
        <div id="host-ui" class="hidden space-y-6">
            <p class="text-sm text-gray-400">① 先に画面共有を開始し、② スマホでQR読み取り、またはURLをシェアしてください。</p>
            
            <div>
                <button id="start-share-btn" class="bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-2 px-6 rounded-lg transition duration-200 shadow-lg cursor-pointer">
                    ① 画面と音声を共有開始
                </button>
            </div>

            <div class="flex flex-col items-center justify-center space-y-3">
                <p class="text-xs text-gray-400">② 視聴用QRコード</p>
                <div id="qrcode" class="bg-white p-4 rounded-lg inline-block shadow-md"></div>
                
                <div class="w-full flex items-center space-x-2 mt-2 bg-gray-900 p-2 rounded-lg border border-gray-700">
                    <input id="share-url-input" type="text" readonly class="bg-transparent text-xs text-gray-400 flex-1 outline-none overflow-x-auto whitespace-nowrap" value="URL生成中...">
                    <button id="copy-url-btn" class="bg-indigo-600 hover:bg-indigo-500 text-xs font-semibold py-1 px-3 rounded transition duration-200 cursor-pointer whitespace-nowrap">
                        URLをコピー
                    </button>
                </div>
            </div>

            <div id="host-status" class="text-xs text-yellow-500 font-mono bg-gray-900 p-3 rounded border border-gray-700 text-left whitespace-pre-wrap">PeerJS 接続準備中...</div>
            
            <video id="host-video" autoplay playsinline muted class="w-full rounded-lg border border-gray-700 bg-black mt-4 hidden"></video>
        </div>

        <div id="viewer-ui" class="hidden space-y-4">
            <p class="text-sm text-gray-400">PCの画面・音声を受信中...</p>
            <div id="viewer-status" class="text-xs text-yellow-500 font-mono bg-gray-900 p-2 rounded border border-gray-700 text-left">配信者に接続を要求中...</div>
            
            <div class="relative w-full aspect-video bg-black rounded-lg overflow-hidden border border-gray-700 shadow-inner cursor-pointer" id="video-container">
                <video id="viewer-video" autoplay playsinline class="w-full h-full object-contain"></video>
                <div id="tap-notice" class="absolute inset-0 bg-black/70 flex items-center justify-center text-sm text-center p-4 hidden">
                    🎵 タップして音声を有効にする
                </div>
            </div>
            <p class="text-xs text-gray-500">※音が聞こえない場合は、上の画面をタップするか、スマホのマナーモードを解除してください。</p>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const targetRoomId = urlParams.get('room');

        const hostUi = document.getElementById('host-ui');
        const viewerUi = document.getElementById('viewer-ui');
        const hostStatus = document.getElementById('host-status');
        const viewerStatus = document.getElementById('viewer-status');
        const startShareBtn = document.getElementById('start-share-btn');
        const hostVideo = document.getElementById('host-video');
        const viewerVideo = document.getElementById('viewer-video');
        const videoContainer = document.getElementById('video-container');
        const tapNotice = document.getElementById('tap-notice');
        
        // 🛠 追加した要素の取得
        const shareUrlInput = document.getElementById('share-url-input');
        const copyUrlBtn = document.getElementById('copy-url-btn');

        let peer = null;
        let localStream = null;
        let connectedViewers = [];
        let currentShareUrl = ""; // URLを保持する変数

        if (!targetRoomId) {
            // ==========================================
            // 【配信モード (PC側)】
            // ==========================================
            hostUi.classList.remove('hidden');
            
            peer = new Peer();

            peer.on('open', (id) => {
                updateHostStatus(`[接続完了] サーバーに繋がりました。\nあなたの部屋ID: ${id}`, 'text-green-400');

                // 視聴用URLを生成
                currentShareUrl = `${window.location.origin}${window.location.pathname}?room=${id}`;
                
                // 入力欄にURLをセット
                shareUrlInput.value = currentShareUrl;

                // QRコード生成
                document.getElementById('qrcode').innerHTML = ""; 
                new QRCode(document.getElementById('qrcode'), {
                    text: currentShareUrl,
                    width: 180,
                    height: 180
                });
            });

            // 🛠 追加：コピーボタンのクリックイベント
            copyUrlBtn.addEventListener('click', async () => {
                if (!currentShareUrl) return;
                try {
                    await navigator.clipboard.writeText(currentShareUrl);
                    copyUrlBtn.innerText = "コピーしました！";
                    copyUrlBtn.classList.replace('bg-indigo-600', 'bg-green-600');
                    
                    // 2秒後に元の表示に戻す
                    setTimeout(() => {
                        copyUrlBtn.innerText = "URLをコピー";
                        copyUrlBtn.classList.replace('bg-green-600', 'bg-indigo-600');
                    }, 2000);
                } catch (err) {
                    console.error("URLのコピーに失敗:", err);
                    alert("コピーに失敗しました。URL枠の文字を手動でコピーしてください。");
                }
            });

            startShareBtn.addEventListener('click', async () => {
                try {
                    localStream = await navigator.mediaDevices.getDisplayMedia({
                        video: { cursor: "always" },
                        audio: true 
                    });
                    
                    hostVideo.srcObject = localStream;
                    hostVideo.classList.remove('hidden');
                    startShareBtn.innerText = "配信中";
                    startShareBtn.disabled = true;
                    startShareBtn.classList.add('bg-gray-600', 'cursor-not-allowed');

                    const audioTracks = localStream.getAudioTracks();
                    if (audioTracks.length === 0) {
                        const errMsg = "❌【音声が送信されていません！】\n\n原因の可能性:\n① 画面共有時のポップアップ左下にある「システムの音声を共有」にチェックを入れていない。\n② Macをご利用の場合、「画面全体」を選ぶと構造上音が取れません。「Chromeのタブ」を選んで配信してください。";
                        updateHostStatus(errMsg, 'text-red-400 font-bold bg-red-950/50 border-red-500');
                        alert("⚠️ 音声が共有されていません！\n\n画面共有のポップアップで「音声を共有」にチェックを入れるか、Macの場合は「タブ」を選択してやり直してください。");
                    } else {
                        updateHostStatus(`✅ 画面 ＋ 音声の取得に成功！\n現在 ${connectedViewers.length} 台の端末に配信中。`, 'text-green-400');
                    }

                    if (connectedViewers.length > 0) {
                        connectedViewers.forEach(viewerId => {
                            peer.call(viewerId, localStream);
                        });
                    }
                } catch (err) {
                    console.error("配信の取得失敗:", err);
                    alert("画面共有の開始に失敗しました。ページを再読み込みしてください。");
                }
            });

            peer.on('connection', (conn) => {
                if (localStream) {
                    peer.call(conn.peer, localStream);
                    const audioTracks = localStream.getAudioTracks();
                    if(audioTracks.length > 0) {
                        updateHostStatus(`スマホが接続されました。映像・音声送信中！`, 'text-green-400');
                    }
                } else {
                    if (!connectedViewers.includes(conn.peer)) {
                        connectedViewers.push(conn.peer);
                    }
                    updateHostStatus(`スマホが接続して待機中。\nPC側で「① 画面と音声を共有開始」を押してください。`, 'text-yellow-500');
                }
            });

            function updateHostStatus(text, colorClass) {
                hostStatus.innerText = text;
                hostStatus.className = `text-xs font-mono bg-gray-900 p-3 rounded border border-gray-700 text-left whitespace-pre-wrap ${colorClass}`;
            }

        } else {
            // ==========================================
            // 【視聴モード (スマホ側)】
            // ==========================================
            viewerUi.classList.remove('hidden');
            
            peer = new Peer();

            peer.on('open', (myId) => {
                viewerStatus.innerText = `配信者(PC)に接続を要求しています...`;
                const conn = peer.connect(targetRoomId);
                
                conn.on('open', () => {
                    viewerStatus.innerText = `PCと接続確立。配信（画面共有）が始まるのを待っています...`;
                });
            });

            peer.on('call', (call) => {
                viewerStatus.innerText = `受信中！画面をタップすると音が出ます。`;
                viewerStatus.classList.replace('text-yellow-500', 'text-green-400');
                
                call.answer();
                
                call.on('stream', (remoteStream) => {
                    viewerVideo.srcObject = remoteStream;
                    viewerVideo.muted = true; 
                    viewerVideo.play().then(() => {
                        tapNotice.classList.remove('hidden');
                    });
                });
            });

            videoContainer.addEventListener('click', () => {
                if (viewerVideo.srcObject) {
                    viewerVideo.muted = false;
                    tapNotice.classList.add('hidden');
                    viewerStatus.innerText = `受信中！（音声有効化済み）`;
                }
            });

            peer.on('error', (err) => {
                viewerStatus.innerText = `エラーが発生しました。URLまたはQRコードを確認してください。`;
                viewerStatus.classList.replace('text-yellow-500', 'text-red-400');
            });
        }
    </script>
</body>
</html>
